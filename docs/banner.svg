<svg xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink" viewBox="0 0 1280 360" width="1280" height="360" font-family="'Segoe UI', system-ui, -apple-system, sans-serif">
  <defs>
    <linearGradient id="brand" x1="0" y1="0" x2="1" y2="0.3">
      <stop offset="0" stop-color="#2f6bff"/>
      <stop offset="0.45" stop-color="#8b6cff"/>
      <stop offset="0.78" stop-color="#ff4f8b"/>
      <stop offset="1" stop-color="#ffc736"/>
      <animateTransform attributeName="gradientTransform" type="translate" values="-0.25 0; 0.25 0; -0.25 0" dur="9s" repeatCount="indefinite"/>
    </linearGradient>
    <filter id="soft" x="-50%" y="-50%" width="200%" height="200%"><feGaussianBlur stdDeviation="46"/></filter>
    <radialGradient id="b1"><stop offset="0" stop-color="#2f6bff" stop-opacity="0.45"/><stop offset="1" stop-color="#2f6bff" stop-opacity="0"/></radialGradient>
    <radialGradient id="b2"><stop offset="0" stop-color="#ff4f8b" stop-opacity="0.40"/><stop offset="1" stop-color="#ff4f8b" stop-opacity="0"/></radialGradient>
    <radialGradient id="b3"><stop offset="0" stop-color="#ffc736" stop-opacity="0.45"/><stop offset="1" stop-color="#ffc736" stop-opacity="0"/></radialGradient>
  </defs>

  <rect width="1280" height="360" fill="#ffffff"/>

  <!-- floating ambient blobs -->
  <circle cx="170" cy="110" r="150" fill="url(#b1)" filter="url(#soft)">
    <animateTransform attributeName="transform" type="translate" values="0 0; 0 26; 0 0" dur="9s" repeatCount="indefinite"/>
  </circle>
  <circle cx="1120" cy="90" r="150" fill="url(#b2)" filter="url(#soft)">
    <animateTransform attributeName="transform" type="translate" values="0 0; 0 -24; 0 0" dur="11s" repeatCount="indefinite"/>
  </circle>
  <circle cx="980" cy="320" r="160" fill="url(#b3)" filter="url(#soft)">
    <animateTransform attributeName="transform" type="translate" values="0 0; 0 22; 0 0" dur="10s" repeatCount="indefinite"/>
  </circle>

  <!-- wordmark -->
  <text x="640" y="150" text-anchor="middle" font-size="94" font-weight="800" fill="url(#brand)" letter-spacing="3">MERIDIAN</text>
  <text x="640" y="198" text-anchor="middle" font-size="22" font-weight="500" fill="#565d72">Growth Intelligence for creator-driven revenue</text>

  <!-- connection flow: brand -> meridian -> revenue -->
  <path id="flowline" d="M260 286 H1020" fill="none" stroke="url(#brand)" stroke-width="2.5" stroke-linecap="round" stroke-dasharray="6 12" opacity="0.55">
    <animate attributeName="stroke-dashoffset" values="0;-180" dur="3.6s" repeatCount="indefinite"/>
  </path>

  <!-- nodes -->
  <g>
    <circle cx="260" cy="286" r="9" fill="#2f6bff"><animate attributeName="r" values="9;13;9" dur="2.4s" repeatCount="indefinite"/></circle>
    <circle cx="640" cy="286" r="11" fill="#8b6cff"><animate attributeName="r" values="11;15;11" dur="2.4s" begin="0.6s" repeatCount="indefinite"/></circle>
    <circle cx="1020" cy="286" r="9" fill="#ff4f8b"><animate attributeName="r" values="9;13;9" dur="2.4s" begin="1.2s" repeatCount="indefinite"/></circle>
  </g>

  <!-- traveling data packets -->
  <circle r="5.5" fill="#2f6bff"><animateMotion dur="3.6s" repeatCount="indefinite"><mpath xlink:href="#flowline"/></animateMotion></circle>
  <circle r="5.5" fill="#ff4f8b"><animateMotion dur="3.6s" begin="1.8s" repeatCount="indefinite"><mpath xlink:href="#flowline"/></animateMotion></circle>

  <!-- labels -->
  <text x="260" y="320" text-anchor="middle" font-size="15" font-weight="600" fill="#0d0e15">Brand</text>
  <text x="640" y="320" text-anchor="middle" font-size="15" font-weight="600" fill="#0d0e15">Meridian</text>
  <text x="1020" y="320" text-anchor="middle" font-size="15" font-weight="600" fill="#0d0e15">Revenue</text>
</svg>
